name: CD

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push-images:
    strategy:
      matrix:
        include:
          - image: matverseny-backend
            containerfile: ./Containerfile
          - image: matverseny-migration
            containerfile: ./containerfiles/migration.Containerfile
          - image: matverseny-setup
            containerfile: ./containerfiles/setup.Containerfile

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ matrix.image }}
          tags: latest ${{ github.sha }} ${{ github.ref_name }}
          containerfiles: ${{ matrix.containerfile }}
          build-args: |
            RUST_VERSION=1.91
            CARGO_CHEF_VERSION=0.1.73
          oci: true

      - name: Push image
        id: push-image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ghcr.io/verseghy
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Print image URL
        run: echo "Image pushed to ${{ steps.push-image.outputs.registry-paths }}"
